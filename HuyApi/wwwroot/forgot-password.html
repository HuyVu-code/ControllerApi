<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu | HuyStore.vn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/css/auth.css">
    <style>
        .method-tabs {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .method-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .method-tab.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <!-- Left: Brand Info -->
    <div class="auth-side-brand" style="background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(227, 24, 55, 0.9)), url('https://images.unsplash.com/photo-1450101499163-c8848c66ca85?q=80&w=1000');">
        <div>
            <div class="auth-logo-circle" style="background: #fff; color: var(--primary);">H</div>
            <div class="brand-content">
                <h2>Đừng lo lắng!</h2>
                <p>Chúng tôi sẽ giúp bạn lấy lại quyền truy cập vào tài khoản HuyStore chỉ trong vài phút.</p>
            </div>
        </div>
        <div class="brand-footer">
            © 2026 HuyStore.vn - Security Center
        </div>
    </div>

    <!-- Right: Forgot Form -->
    <div class="auth-side-form">
        <h1 class="auth-title">Quên mật khẩu</h1>
        <p class="auth-subtitle">Chọn phương thức để nhận mã xác minh</p>

        <div class="method-tabs">
            <div class="method-tab active" onclick="switchMethod('email')">Email</div>
            <div class="method-tab" onclick="switchMethod('phone')">Số điện thoại</div>
        </div>

        <div id="authAlert" class="alert-premium"></div>

        <form id="forgotForm">
            <!-- Email Method -->
            <div id="emailInputGroup" class="form-group">
                <input type="email" id="resetEmail" class="form-control-premium" placeholder="Nhập địa chỉ Email của bạn">
                <i class="fas fa-envelope"></i>
            </div>

            <!-- Phone Method -->
            <div id="phoneInputGroup" class="form-group" style="display: none;">
                <input type="text" id="resetPhone" class="form-control-premium" placeholder="Nhập số điện thoại đăng ký">
                <i class="fas fa-phone"></i>
            </div>

            <button type="submit" class="btn-premium">GỬI MÃ XÁC MINH</button>
        </form>

        <div class="auth-switch">
            Nhớ ra mật khẩu rồi? <a href="login.html">Quay lại đăng nhập</a>
        </div>
    </div>
</div>

<script>
    let currentMethod = 'email';

    function switchMethod(method) {
        currentMethod = method;
        document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        if (method === 'email') {
            document.getElementById('emailInputGroup').style.display = 'block';
            document.getElementById('phoneInputGroup').style.display = 'none';
        } else {
            document.getElementById('emailInputGroup').style.display = 'none';
            document.getElementById('phoneInputGroup').style.display = 'block';
        }
    }

    document.getElementById('forgotForm').onsubmit = (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('authAlert');
        const value = currentMethod === 'email' 
            ? document.getElementById('resetEmail').value 
            : document.getElementById('resetPhone').value;

        if (!value) {
            alertBox.innerText = `Vui lòng nhập ${currentMethod === 'email' ? 'email' : 'số điện thoại'}!`;
            alertBox.className = 'alert-premium alert-error';
            alertBox.style.display = 'block';
            return;
        }

        // Giả lập gửi mã
        alertBox.innerText = `Mã xác minh đã được gửi đến ${value}. Vui lòng kiểm tra!`;
        alertBox.className = 'alert-premium alert-success';
        alertBox.style.display = 'block';
    };
</script>
</body>
</html>
