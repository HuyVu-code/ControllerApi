<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của bạn | HuyStore.vn Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="src/css/style.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #E31837 0%, #B2132A 100%);
            --glass: rgba(255, 255, 255, 0.95);
        }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .cart-page-wrapper { padding: 50px 0; min-height: 90vh; }
        
        .premium-card {
            background: var(--glass);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 30px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        /* Free Shipping Progress */
        .shipping-progress-box {
            background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }
        .progress-bar-wrap {
            height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; width: 70%; background: var(--primary-gradient);
            border-radius: 10px; transition: width 0.5s ease-in-out;
        }

        /* Cart Item Design */
        .cart-item-row {
            display: grid;
            grid-template-columns: 100px 1fr 140px 140px;
            align-items: center;
            padding: 25px 0;
            border-bottom: 1px solid #f1f1f1;
            transition: all 0.3s;
        }
        .cart-item-row:hover { background: rgba(227, 24, 55, 0.01); }
        .cart-item-row:last-child { border-bottom: none; }
        
        .cart-item-img {
            width: 100%; height: 130px; object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s;
        }
        .cart-item-row:hover .cart-item-img { transform: scale(1.05); }

        .cart-item-title { font-weight: 700; font-size: 17px; color: #1a1a2e; margin-bottom: 4px; }
        .cart-item-author { font-size: 13px; color: #888; }
        .item-price-unit { font-size: 15px; font-weight: 600; color: #444; margin-top: 10px; }

        /* Qty Control Premium */
        .qty-control {
            display: flex; align-items: center; justify-content: space-between;
            background: #f8f9fa; border-radius: 12px; padding: 6px; width: 110px;
            border: 1px solid #eee;
        }
        .qty-btn {
            width: 30px; height: 30px; border-radius: 8px; border: none;
            background: #fff; color: #1a1a2e; font-weight: 700;
            transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .qty-btn:hover { background: var(--red); color: #fff; }
        .qty-val { font-weight: 700; font-size: 14px; }

        .item-total-price { font-weight: 800; color: var(--red); font-size: 18px; text-align: right; }
        .btn-remove-item {
            color: #ccc; border: none; background: none; font-size: 18px;
            transition: color 0.3s; margin-top: 10px;
        }
        .btn-remove-item:hover { color: var(--red); }

        /* Sidebar Summary */
        .summary-title { font-size: 20px; font-weight: 800; margin-bottom: 25px; color: #1a1a2e; }
        .promo-box {
            display: flex; gap: 10px; margin-bottom: 25px;
        }
        .promo-input {
            flex: 1; border: 1px solid #eee; border-radius: 12px; padding: 12px 15px;
            font-size: 14px; outline: none; transition: border-color 0.3s;
        }
        .promo-input:focus { border-color: var(--red); }
        .btn-promo {
            padding: 0 20px; border-radius: 12px; background: #1a1a2e; color: #fff;
            border: none; font-weight: 600; font-size: 13px;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 18px; color: #555; }
        .total-row {
            display: flex; justify-content: space-between; margin-top: 20px;
            padding-top: 20px; border-top: 2px dashed #eee;
        }
        .total-label { font-size: 18px; font-weight: 800; color: #1a1a2e; }
        .total-value { font-size: 24px; font-weight: 800; color: var(--red); }

        .btn-checkout-premium {
            width: 100%; padding: 18px; border-radius: 16px;
            background: var(--primary-gradient); color: #fff; border: none;
            font-weight: 700; font-size: 16px; margin-top: 25px;
            box-shadow: 0 15px 30px rgba(227, 24, 55, 0.25);
            transition: all 0.3s;
        }
        .btn-checkout-premium:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(227, 24, 55, 0.35); }

        .payment-methods-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 25px;
        }
        .payment-icon {
            background: #fff; border: 1px solid #eee; border-radius: 8px;
            height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #666;
        }
    </style>
</head>
<body>

<header class="main-header bg-white shadow-sm sticky-top">
    <div class="container d-flex align-items-center justify-content-between py-3">
        <a href="index.html" class="logo-wrap text-decoration-none">
            <div class="logo-box">H</div>
            <span class="logo-text">HuyStore<span style="color:var(--text)">.vn</span></span>
        </a>
        <div class="header-actions d-flex align-items-center gap-4">
            <span class="text-muted d-none d-md-block"><i class="fas fa-shield-alt me-1"></i> Thanh toán bảo mật 100%</span>
            <a href="index.html" class="btn btn-light rounded-pill px-4 fw-bold" style="font-size: 14px;">
                <i class="fas fa-arrow-left me-2"></i> Quay lại
            </a>
        </div>
    </div>
</header>

<div class="cart-page-wrapper">
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <!-- Free Shipping Box -->
                <div class="shipping-progress-box">
                    <div class="d-flex align-items-center gap-3">
                        <div style="font-size: 24px;">🚚</div>
                        <div>
                            <div class="fw-bold" id="shippingStatus">Mua thêm 200.000đ để được Miễn phí vận chuyển</div>
                            <div class="progress-bar-wrap">
                                <div class="progress-bar-fill" id="shippingProgress"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Cart Items -->
                <div class="premium-card">
                    <h4 class="fw-bold mb-4 d-flex align-items-center justify-content-between">
                        Giỏ hàng của bạn
                        <span class="badge bg-danger rounded-pill" id="cartBadgeTotal" style="font-size: 12px;">0 items</span>
                    </h4>
                    <div id="cartItemsListContainer">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="premium-card summary-card">
                    <h5 class="summary-title">Tóm tắt đơn hàng</h5>
                    
                    <div class="promo-box">
                        <input type="text" class="promo-input" placeholder="Mã giảm giá (HUY2026)">
                        <button class="btn-promo">ÁP DỤNG</button>
                    </div>

                    <div class="summary-row">
                        <span>Tạm tính</span>
                        <span id="subtotal" class="fw-bold">0đ</span>
                    </div>
                    <div class="summary-row">
                        <span>Giảm giá</span>
                        <span class="text-success">-0đ</span>
                    </div>
                    <div class="summary-row">
                        <span>Phí vận chuyển</span>
                        <span id="shippingFee" class="fw-bold">Miễn phí</span>
                    </div>

                    <div class="total-row">
                        <span class="total-label">Tổng cộng</span>
                        <span class="total-value" id="grandTotal">0đ</span>
                    </div>

                    <button class="btn btn-danger w-100 py-3 fw-bold rounded-pill shadow-sm mt-3" 
                onclick="window.location.href='checkout-v2.html'">
                THANH TOÁN NGAY <i class="fas fa-arrow-right ms-2"></i>
            </button>

                    <div class="payment-methods-grid">
                        <div class="payment-icon"><i class="fab fa-cc-visa"></i></div>
                        <div class="payment-icon"><i class="fab fa-cc-mastercard"></i></div>
                        <div class="payment-icon"><i class="fab fa-google-pay"></i></div>
                        <div class="payment-icon"><i class="fas fa-qrcode"></i></div>
                    </div>
                    <p class="text-center mt-4 text-muted" style="font-size: 12px;">
                        <i class="fas fa-lock me-1"></i> Thông tin của bạn được bảo mật tuyệt đối
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="src/js/cart-v3.js"></script>
</body>
</html>
