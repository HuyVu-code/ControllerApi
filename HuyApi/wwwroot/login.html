<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | HuyStore.vn Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/css/auth.css">
</head>
<body>

<div class="auth-wrapper">
    <!-- Left: Brand Info -->
    <div class="auth-side-brand">
        <div>
            <div class="auth-logo-circle" style="background: #fff; color: var(--primary);">H</div>
            <div class="brand-content">
                <h2>Khám phá thế giới sách cùng HuyStore</h2>
                <p>Đăng nhập để nhận ưu đãi đặc quyền, quản lý đơn hàng và trải nghiệm dịch vụ đọc sách tốt nhất Việt Nam.</p>
            </div>
        </div>
        <div class="brand-footer">
            © 2026 HuyStore.vn - Premium Experience
        </div>
    </div>

    <!-- Right: Login Form -->
    <div class="auth-side-form">
        <div class="d-lg-none mb-4">
            <div class="auth-logo-circle">H</div>
        </div>
        <h1 class="auth-title">Đăng nhập</h1>
        <p class="auth-subtitle">Chào mừng bạn quay trở lại!</p>

        <div id="authAlert" class="alert-premium alert-error"></div>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" class="form-control-premium" placeholder="Tên đăng nhập" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="form-control-premium" placeholder="Mật khẩu" required>
                <i class="fas fa-lock"></i>
            </div>

            <div style="text-align: right; margin-bottom: 25px;">
                <a href="forgot-password.html" style="color: var(--muted); font-size: 13px; text-decoration: none;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-premium">ĐĂNG NHẬP NGAY</button>
        </form>

        <div class="social-login">
            <button class="btn-social">
                <i class="fab fa-google" style="color: #ea4335; font-size: 20px;"></i> Google
            </button>
            <button class="btn-social">
                <i class="fab fa-facebook" style="color: #1877f2; font-size: 20px;"></i> Facebook
            </button>
        </div>

        <div class="auth-switch">
            Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>
</div>

<script src="src/js/auth.js"></script>
</body>
</html>
