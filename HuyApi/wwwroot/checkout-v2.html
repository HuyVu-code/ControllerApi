<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán | HuyStore.vn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --p-red: #ee4d2d; --p-text: #222; }
        body { background: #f5f5f5; font-family: 'Inter', sans-serif; color: var(--p-text); }
        .checkout-container { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
        .checkout-card { background: #fff; border-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 15px; border: none; }
        .block-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--p-red); }
        
        .input-custom { width: 100%; border: 1px solid rgba(0,0,0,.14); border-radius: 2px; padding: 12px; font-size: 14px; outline: none; margin-bottom: 12px; }
        .input-custom:focus { border-color: var(--p-red); }

        .method-item { border: 1px solid rgba(0,0,0,.09); border-radius: 2px; padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .method-item.active { border-color: var(--p-red); color: var(--p-red); position: relative; }
        .method-item.active::after { content: '✓'; position: absolute; right: 0; bottom: 0; background: var(--p-red); color: white; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .method-icon { width: 24px; height: 24px; object-fit: contain; margin-right: 12px; }

        .order-item-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #f1f1f1; }
        .item-img { width: 40px; height: 55px; object-fit: contain; border: 1px solid #eee; }
        .qty-box { display: flex; align-items: center; border: 1px solid #eee; }
        .qty-btn { border: none; background: #fff; width: 25px; height: 25px; }
        .qty-val { width: 30px; text-align: center; font-size: 12px; }

        .btn-order { background: var(--p-red); color: white; border: none; width: 200px; padding: 12px; font-weight: 500; border-radius: 2px; }
        
        #paymentOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="paymentOverlay">
    <div class="spinner"></div>
    <h5 class="fw-bold mt-3" id="overlayTitle">Đang xử lý thanh toán...</h5>
    <p class="text-muted small">Vui lòng giữ kết nối Internet</p>
</div>

<header class="bg-white py-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="index.html" class="text-decoration-none h4 fw-bold text-danger mb-0">HuyStore<span class="text-dark">.vn</span></a>
        <div class="small text-muted">Thanh Toán An Toàn</div>
    </div>
</header>

<div class="checkout-container">
    <div class="row">
        <div class="col-lg-8">
            <div class="checkout-card">
                <h5 class="block-title"><i class="fas fa-map-marker-alt"></i> Địa chỉ nhận hàng</h5>
                <div class="row">
                    <div class="col-md-6"><input type="text" id="custName" class="input-custom" placeholder="Họ và tên"></div>
                    <div class="col-md-6"><input type="text" id="custPhone" class="input-custom" placeholder="Số điện thoại"></div>
                    <div class="col-12"><input type="text" id="custAddr" class="input-custom" placeholder="Địa chỉ chi tiết"></div>
                </div>
            </div>

            <div class="checkout-card">
                <h5 class="block-title">Phương thức thanh toán</h5>
                <div id="paymentMethods">
                    <div class="method-item active" onclick="selectPay('cod', this)">
                        <span><i class="fas fa-truck me-2"></i> Thanh toán khi nhận hàng (COD)</span>
                    </div>
                    <div class="method-item" onclick="selectPay('momo', this)">
                        <span><img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" class="method-icon"> Ví MoMo</span>
                    </div>
                    <div class="method-item" onclick="selectPay('bank', this)">
                        <span><i class="fas fa-university me-2"></i> Chuyển khoản Ngân hàng</span>
                    </div>
                    <div class="method-item" onclick="selectPay('visa', this)">
                        <span><i class="fab fa-cc-visa me-2"></i> Thẻ Visa / Mastercard</span>
                    </div>
                </div>

                <!-- Detail MoMo -->
                <div id="momoBox" class="mt-3 p-3 border rounded d-none text-center">
                    <img src="src/img/momo-qr.png" style="width: 150px;" class="mb-2">
                    <p class="small text-muted mb-0">Nội dung: <b id="momoNote">HUYSTORE</b></p>
                </div>

                <!-- Detail Bank -->
                <div id="bankBox" class="mt-3 p-3 border rounded d-none text-center">
                    <img src="src/img/bank-qr.png" style="width: 200px;" class="mb-2">
                    <p class="small text-muted mb-0">Quét mã để chuyển khoản nhanh</p>
                </div>

                <!-- Detail Visa -->
                <div id="visaBox" class="mt-3 p-3 border rounded d-none">
                    <div class="row g-2">
                        <div class="col-12"><input type="text" class="input-custom mb-2" placeholder="Số thẻ (xxxx xxxx xxxx xxxx)"></div>
                        <div class="col-6"><input type="text" class="input-custom mb-0" placeholder="MM / YY"></div>
                        <div class="col-6"><input type="text" class="input-custom mb-0" placeholder="CVC"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="checkout-card">
                <h5 class="fw-bold mb-3">Tóm tắt đơn hàng</h5>
                <div id="orderItems"></div>
                <div class="mt-3 pt-3 border-top">
                    <div class="d-flex justify-content-between h5 fw-bold text-danger">
                        <span>Tổng cộng:</span>
                        <span id="grandTotal">0₫</span>
                    </div>
                </div>
                <button class="btn-order mt-3 w-100" onclick="placeOrder()">ĐẶT HÀNG</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CART_KEY = 'HuyStore_Cart';
    let selectedMethod = 'Thanh toán khi nhận hàng (COD)';
    let cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');

    document.addEventListener('DOMContentLoaded', () => {
        if (cart.length === 0) { window.location.href = 'index.html'; return; }
        renderOrder();
    });

    function renderOrder() {
        const container = document.getElementById('orderItems');
        let total = 0;
        container.innerHTML = cart.map((item, index) => {
            total += item.price * item.qty;
            return `
                <div class="order-item-row">
                    <img src="${item.img || 'src/img/default-book.png'}" class="item-img">
                    <div class="flex-grow-1">
                        <div class="small fw-bold">${item.title}</div>
                        <div class="qty-box mt-1">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                            <div class="qty-val">${item.qty}</div>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                    </div>
                    <div class="text-end">
                        <div class="small text-danger fw-bold">${(item.price * item.qty).toLocaleString('vi-VN')}₫</div>
                        <button class="btn-del small text-muted border-0 bg-transparent p-0" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('grandTotal').innerText = total.toLocaleString('vi-VN') + '₫';
    }

    function updateQty(index, delta) {
        cart[index].qty += delta;
        if (cart[index].qty < 1) cart[index].qty = 1;
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
        renderOrder();
    }

    function removeItem(index) {
        if (confirm("Xóa sản phẩm này?")) {
            cart.splice(index, 1);
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            if (cart.length === 0) window.location.href = 'index.html';
            else renderOrder();
        }
    }

    function selectPay(id, el) {
        document.querySelectorAll('.method-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        selectedMethod = el.innerText.trim();

        document.getElementById('momoBox').classList.add('d-none');
        document.getElementById('bankBox').classList.add('d-none');
        document.getElementById('visaBox').classList.add('d-none');

        if (id === 'momo') document.getElementById('momoBox').classList.remove('d-none');
        if (id === 'bank') document.getElementById('bankBox').classList.remove('d-none');
        if (id === 'visa') document.getElementById('visaBox').classList.remove('d-none');
    }

    function placeOrder() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const addr = document.getElementById('custAddr').value.trim();
        if (!name || !phone || !addr) return alert("Vui lòng nhập đủ thông tin!");

        if (selectedMethod !== 'Thanh toán khi nhận hàng (COD)') {
            document.getElementById('paymentOverlay').style.display = 'flex';
            setTimeout(() => {
                finishOrder(name, phone, addr);
            }, 3000);
        } else {
            finishOrder(name, phone, addr);
        }
    }

    function finishOrder(name, phone, addr) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('vi-VN') + ' ' + now.toLocaleTimeString('vi-VN');
        
        const orderData = {
            id: 'HS' + Math.floor(Math.random()*1000000),
            customer: { name, phone, addr },
            items: cart,
            method: selectedMethod,
            total: document.getElementById('grandTotal').innerText,
            date: dateStr,
            // Nếu là tiền mặt thì để "Đang giao hàng", còn lại là "Đã thanh toán"
            status: (selectedMethod.includes('nhận hàng')) ? 'Đang giao hàng' : 'Đã thanh toán'
        };

        localStorage.setItem('latestOrder', JSON.stringify(orderData));

        // LƯU VÀO DANH SÁCH TỔNG CHO ADMIN QUẢN LÝ
        let allOrders = JSON.parse(localStorage.getItem('HuyStore_AllOrders') || '[]');
        allOrders.unshift(orderData); // Thêm vào đầu danh sách
        localStorage.setItem('HuyStore_AllOrders', JSON.stringify(allOrders));

        localStorage.removeItem(CART_KEY);
        window.location.href = 'order-success.html';
    }
</script>
</body>
</html>
