<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | HuyStore.vn Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/css/auth.css">
</head>
<body>

<div class="auth-wrapper">
    <!-- Left: Brand Info -->
    <div class="auth-side-brand" style="background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(227, 24, 55, 0.9)), url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1000');">
        <div>
            <div class="auth-logo-circle" style="background: #fff; color: var(--primary);">H</div>
            <div class="brand-content">
                <h2>Trở thành thành viên của gia đình HuyStore</h2>
                <p>Tạo tài khoản để tích điểm đổi quà, nhận mã giảm giá và lưu tủ sách yêu thích của riêng bạn.</p>
            </div>
        </div>
        <div class="brand-footer">
            © 2026 HuyStore.vn - Join the Community
        </div>
    </div>

    <!-- Right: Register Form -->
    <div class="auth-side-form">
        <h1 class="auth-title">Đăng ký</h1>
        <p class="auth-subtitle">Bắt đầu hành trình của bạn ngay!</p>

        <div id="authAlert" class="alert-premium"></div>

        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="username" class="form-control-premium" placeholder="Tên đăng nhập" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <input type="email" id="email" class="form-control-premium" placeholder="Địa chỉ Email" required>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="form-control-premium" placeholder="Mật khẩu" required>
                <i class="fas fa-lock"></i>
            </div>

            <div class="form-group">
                <input type="password" id="confirmPassword" class="form-control-premium" placeholder="Xác nhận mật khẩu" required>
                <i class="fas fa-shield-alt"></i>
            </div>

            <button type="submit" class="btn-premium">TẠO TÀI KHOẢN</button>
        </form>

        <div class="auth-switch">
            Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>
</div>

<script src="src/js/auth.js"></script>
</body>
</html>
